# KTV 系统 docker-compose（部署在 UGREEN DXP4800 Plus）
#
# 首次部署前（SSH 到 NAS）：
#   sudo mkdir -p /volume1/docker/ktv/{openlist,library,backend}
#   sudo chown -R 1000:1000 /volume1/docker/ktv
#
# 启动：
#   docker compose up -d
#
# 访问：
#   OpenList 管理界面：http://<NAS IP>:5244  (首次登录看 docker logs 取初始密码)
#   KTV 后端（M1 起）：http://<NAS IP>:8080

services:
  openlist:
    image: openlistteam/openlist:latest
    container_name: ktv-openlist
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=022
      - TZ=Europe/Stockholm
    volumes:
      # OpenList 自己的配置与索引
      - /volume1/docker/ktv/openlist:/opt/openlist/data
      # KTV MV 下载目标目录（OpenList 内作为"Local 存储"挂载这个路径）
      - /volume1/docker/ktv/library:/library
    ports:
      - "5244:5244"

